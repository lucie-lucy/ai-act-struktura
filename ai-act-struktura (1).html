<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Act – struktura</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#fff;">
<div id="root"></div>
<script type="text/babel">
const sections = [
  { id:"basics", label:"Základní ustanovení", sublabel:"čl. 1–3", articles:3, color:"#a8d8e8", textColor:"#1a3a6b", note:"Předmět, rozsah působnosti, definice pojmů." },
  { id:"literacy", label:"AI gramotnost", sublabel:"čl. 4", articles:1, color:"#7ecfdd", textColor:"#1a3a6b", note:"Povinnost zajistit dostatečnou AI gramotnost zaměstnanců a osob pracujících s AI systémy." },
  { id:"prohibited", label:"Zakázané systémy", sublabel:"čl. 5", articles:1, color:"#4bbfb8", textColor:"#fff", note:"Systémy s nepřijatelným rizikem: biometrické třídění, sociální scoring, sublimální manipulace, real-time biometrická identifikace na veřejných místech a další." },
  { id:"highrisk", label:"Vysoce rizikové systémy", sublabel:"čl. 6–49", articles:44, color:"#2b7fc4", textColor:"#fff", note:"Jádro AI Actu. Klasifikace systémů, požadavky na kvalitu dat, technickou dokumentaci, transparentnost vůči uživatelům, lidský dohled, posouzení shody a registrace v EU databázi.", isBig:true },
  { id:"transparency", label:"Transparentnost", sublabel:"čl. 50", articles:1, color:"#1d6aad", textColor:"#fff", note:"Povinnost označovat chatboty, deepfakes a AI-generovaný obsah tak, aby uživatelé věděli, že komunikují s umělou inteligencí." },
  { id:"gpai", label:"Obecné modely AI (GPAI)", sublabel:"čl. 51–56", articles:6, color:"#1a5a9e", textColor:"#fff", note:"Povinnosti pro poskytovatele velkých jazykových modelů (GPT, Claude, Gemini…): transparentnost, technická dokumentace, kodexy chování a zvláštní režim pro modely se systémovým rizikem." },
  { id:"sandbox", label:"Sandbox & testování", sublabel:"čl. 57–63", articles:7, color:"#154d88", textColor:"#fff", note:"Regulatorní sandboxy a možnost testovat vysoce rizikové systémy v reálných podmínkách před uvedením na trh. Podpora inovací, zejména pro malé a střední podniky." },
  { id:"governance", label:"Dozor, vymáhání, sankce", sublabel:"čl. 64–101", articles:38, color:"#1a3a6b", textColor:"#fff", note:"Národní dozorové orgány, AI Office, Rada pro AI, vyšetřovací pravomoci a sankce až do výše 35 mil. € nebo 7 % celosvětového ročního obratu.", isBig:true },
  { id:"misc", label:"Různá ustanovení", sublabel:"čl. 101–113", articles:13, color:"#0f2650", textColor:"#fff", note:"Delegované a prováděcí akty, přechodná období, nabytí účinnosti." },
];

const total = sections.reduce((a,b) => a + b.articles, 0);

function App() {
  const [active, setActive] = React.useState(null);
  const activeSection = sections.find(s => s.id === active);

  return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:"#fff",minHeight:"100vh",padding:"36px 32px 32px",boxSizing:"border-box"}}>
      <div style={{maxWidth:880,margin:"0 auto"}}>

        <div style={{display:"flex",height:64,borderRadius:8,overflow:"hidden",boxShadow:"0 2px 16px rgba(26,58,107,0.13)",marginBottom:8}}>
          {sections.map(s => {
            const pct = (s.articles/total)*100;
            const isActive = active===s.id;
            return (
              <div key={s.id}
                onMouseEnter={() => setActive(s.id)}
                onMouseLeave={() => setActive(null)}
                style={{width:`${pct}%`,background:s.color,cursor:"pointer",transition:"filter 0.15s",filter:isActive?"brightness(1.12)":"brightness(1)",outline:isActive?"3px solid rgba(255,255,255,0.6)":"none",outlineOffset:"-3px"}}
              />
            );
          })}
        </div>

        <div style={{display:"flex",marginBottom:24}}>
          {sections.map(s => {
            const pct = (s.articles/total)*100;
            const isActive = active===s.id;
            return (
              <div key={s.id} style={{width:`${pct}%`,paddingTop:5,overflow:"visible"}}>
                {(s.isBig||s.articles>=6) && (
                  <div style={{fontSize:9,color:isActive?"#1a3a6b":"#8a9ab8",fontWeight:isActive?700:400,lineHeight:1.3,transition:"color 0.15s",whiteSpace:"nowrap"}}>
                    {s.sublabel}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(195px, 1fr))",gap:"6px 12px",marginBottom:24}}>
          {sections.map(s => {
            const isActive = active===s.id;
            return (
              <div key={s.id}
                onMouseEnter={() => setActive(s.id)}
                onMouseLeave={() => setActive(null)}
                style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",padding:"5px 7px",borderRadius:5,background:isActive?"#eef3fa":"transparent",transition:"background 0.15s"}}
              >
                <div style={{width:11,height:11,borderRadius:2,background:s.color,flexShrink:0,marginTop:3,border:"1px solid rgba(0,0,0,0.08)"}}/>
                <div>
                  <div style={{fontSize:11.5,fontWeight:isActive?700:600,color:"#1a3a6b",lineHeight:1.3}}>{s.label}</div>
                  <div style={{fontSize:10,color:"#8a9ab8"}}>{s.sublabel} · {s.articles} {s.articles===1?"článek":s.articles<5?"články":"článků"}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{minHeight:72,background:activeSection?activeSection.color:"#eef3fa",borderRadius:8,padding:"18px 22px",transition:"background 0.2s"}}>
          {activeSection ? (
            <div>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:7,flexWrap:"wrap"}}>
                <span style={{fontSize:15,fontWeight:700,color:activeSection.textColor}}>{activeSection.label}</span>
                <span style={{fontSize:11,color:activeSection.textColor,opacity:0.75}}>{activeSection.sublabel}</span>
              </div>
              <p style={{fontSize:12.5,color:activeSection.textColor,opacity:0.9,lineHeight:1.65,margin:0}}>{activeSection.note}</p>
            </div>
          ) : (
            <p style={{fontSize:12.5,color:"#8a9ab8",margin:0,lineHeight:1.6,fontStyle:"italic"}}>Najeďte myší na sekci pro zobrazení detailu.</p>
          )}
        </div>

        <div style={{marginTop:16,fontSize:10,color:"#b0bcd4",lineHeight:1.6,borderTop:"1px solid #e0e8f4",paddingTop:12}}>
          Proporce vycházejí z počtu článků (celkem 113). Vysoce rizikové systémy (čl. 6–49) tvoří 39 % závazného textu. Dozor a sankce (čl. 64–101) dalších 34 %.
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
